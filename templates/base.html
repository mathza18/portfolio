<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ezequiel Zamora — Python Backend Developer{% endblock %}</title>
  <meta name="description" content="{% block description %}Portfolio y blog de Ezequiel Zamora, desarrollador Python backend en formación. Computación, matemáticas, física.{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

  <style>
    /* ── DESIGN TOKENS ──────────────────────────────────── */
    :root {
      --ink:        #0a0a0f;
      --ink-soft:   #2a2a35;
      --ink-muted:  #6b6b80;
      --paper:      #f5f3ee;
      --paper-warm: #ede9e0;
      --accent:     #c8410a;
      --accent-alt: #1a4f8c;
      --line:       #d4cfc5;
      --code-bg:    #1a1a24;
      --code-text:  #b8d4f0;

      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-body:  'DM Sans', system-ui, sans-serif;
      --font-mono:  'DM Mono', 'Courier New', monospace;

      --max-w: 1100px;
      --gap:   clamp(1.5rem, 4vw, 3rem);
    }

    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      font-size: clamp(15px, 1.1vw, 17px);
      line-height: 1.7;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    /* ── NOISE TEXTURE ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    /* ── NAV ────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,243,238,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 var(--gap);
    }
    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo .dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }
    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }
    .nav-links a {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      transition: color .2s;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--gap);
    }

    /* ── TYPOGRAPHY ─────────────────────────────────────── */
    h1,h2,h3 { font-family: var(--font-serif); line-height: 1.15; }
    h1 { font-size: clamp(2.4rem, 5.5vw, 4.2rem); }
    h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); }
    h3 { font-size: clamp(1.2rem, 2vw, 1.6rem); }

    /* ── BUTTONS ────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0.65rem 1.4rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      border: 1.5px solid var(--ink);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      transition: all .2s;
    }
    .btn:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-solid {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-solid:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
    }

    /* ── SECTION LABEL ──────────────────────────────────── */
    .section-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.5rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    /* ── DIVIDER ────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: var(--gap) 0;
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--line);
      padding: 2.5rem var(--gap);
      margin-top: 5rem;
    }
    .footer-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .footer-copy {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
    }
    .footer-stack {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-muted);
      display: flex; gap: 0.5rem; align-items: center;
    }
    .stack-pill {
      background: var(--paper-warm);
      border: 1px solid var(--line);
      padding: 2px 8px;
      font-size: 0.68rem;
    }

    /* ── CODE BLOCKS ────────────────────────────────────── */
    pre {
      background: var(--code-bg);
      color: var(--code-text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      border-left: 3px solid var(--accent);
    }
    code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--paper-warm);
      padding: 2px 5px;
      color: var(--accent);
    }
    pre code { background: none; padding: 0; color: inherit; }

    /* ── ANIMATIONS ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .animate { animation: fadeUp .6s ease both; }
    .delay-1 { animation-delay: .1s; }
    .delay-2 { animation-delay: .2s; }
    .delay-3 { animation-delay: .3s; }
    .delay-4 { animation-delay: .4s; }

    /* ── MOBILE ─────────────────────────────────────────── */
    @media(max-width: 640px) {
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.75rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <span class="dot"></span>
      ez.zamora
    </a>
    <ul class="nav-links">
      <li><a href="/" class="{% if page=='home' %}active{% endif %}">Inicio</a></li>
      <li><a href="/#proyectos" class="{% if page=='home' %}{% endif %}">Proyectos</a></li>
      <li><a href="/blog" class="{% if page=='blog' %}active{% endif %}">Blog</a></li>
      <li><a href="/#contacto">Contacto</a></li>
    </ul>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div class="footer-inner">
    <p class="footer-copy">© 2025 Ezequiel Zamora — Santiago, Chile 🇻🇪</p>
    <div class="footer-stack">
      Hecho con
      <span class="stack-pill">FastAPI</span>
      <span class="stack-pill">Jinja2</span>
      <span class="stack-pill">SQLite</span>
      <span class="stack-pill">Python 3</span>
    </div>
  </div>
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
